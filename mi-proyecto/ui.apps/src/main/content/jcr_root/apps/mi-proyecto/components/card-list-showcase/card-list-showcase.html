<sly data-sly-use.model="com.miempresa.core.models.CardListShowcase"
     data-sly-use.templates="./templates/card-template.html"/>

<section class="card-list-showcase ${model.toggleView ? 'card-list-showcase--list' : 'card-list-showcase--grid' @ context='attribute'}"
         data-component="card-list-showcase"
         data-servlet-path="${resource.path @ context='attribute'}.holafuturo.json">

    <sly data-sly-test="${model.sectionTitle}">
        <h2 class="card-list-showcase__title">${model.sectionTitle @ context='text'}</h2>
    </sly>

    <sly data-sly-test="${!model.toggleView}">
        <span class="card-list-showcase__view-label">${'Vista: Cuadrícula' @ i18n}</span>
    </sly>
    <sly data-sly-test="${model.toggleView}">
        <span class="card-list-showcase__view-label">${'Vista: Lista' @ i18n}</span>
    </sly>

    <sly data-sly-test="${model.cards.empty}">
        <p class="card-list-showcase__empty">${'No hay tarjetas disponibles' @ i18n}</p>
    </sly>

    <sly data-sly-test="${!model.cards.empty}">
        <ul class="card-list-showcase__list">
            <li data-sly-list.card="${model.cards}"
                class="card-list-showcase__item ${cardList.odd ? 'is-odd' : 'is-even' @ context='attribute'}"
                data-index="${cardList.index @ context='attribute'}"
                data-count="${cardList.count @ context='attribute'}"
                data-first="${cardList.first @ context='attribute'}"
                data-last="${cardList.last @ context='attribute'}"
                data-even="${cardList.even @ context='attribute'}">
                <sly data-sly-call="${templates.cardTemplate @ card=card, index=cardList.index}"/>
            </li>
        </ul>
        <button class="card-list-showcase__btn"
                data-action="load-all">
            ${'Ver todos' @ i18n}
        </button>
    </sly>

    <div class="card-list-showcase__modal-overlay" aria-modal="true" role="dialog">
        <div class="card-list-showcase__modal">
            <button class="card-list-showcase__modal-close" aria-label="Cerrar">&times;</button>
            <div class="card-list-showcase__modal-content"></div>
        </div>
    </div>

</section>
